services:
  dnscrypt-proxy:
    image: docker.io/klutchell/dnscrypt-proxy:latest
    container_name: dnscrypt-proxy
    restart: unless-stopped
    ports:
      - "53:53/tcp"       # ← moved here from adguardhome
      - "53:53/udp"
      - "80:80/tcp"
      - "443:443/tcp"
      - "3000:3000/tcp"
    expose:
      - "5353"
    volumes:
      - ./dnscrypt-proxy.toml:/config/dnscrypt-proxy.toml:Z
      - ./dnscrypt-data:/config/data:Z

  adguardhome:
    image: docker.io/adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    network_mode: "container:dnscrypt-proxy"
    # no ports here — inherited from dnscrypt-proxy's namespace
    volumes:
      - ./workdir:/opt/adguardhome/work:Z
      - ./confdir:/opt/adguardhome/conf:Z
    environment:
      - TZ=Asia/Kolkata
    depends_on:
      - dnscrypt-proxy
