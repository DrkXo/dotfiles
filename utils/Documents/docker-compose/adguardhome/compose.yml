version: '3.8'

services:
  adguardhome:
    image: docker.io/adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./workdir:/opt/adguardhome/work:Z
      - ./confdir:/opt/adguardhome/conf:Z
    environment:
      - TZ=Asia/Kolkata
    # healthcheck:
    #   test: ["CMD", "dnslookup", "localhost", "127.0.0.1"]
    #   interval: 60s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 60s

