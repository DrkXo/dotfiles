services:
  komga:
    image: gotson/komga
    container_name: komga
    volumes:
      - type: bind
        source: /home/drkxo/komga/config
        target: /config
      - type: bind
        # source: /home/drkxo/komga/data
        source: /home/drkxo/Documents/.tachidesk2/downloads/mangas
        target: /data
    ports:
      - 25600:25600
    user: "1000:1000"
    # remove the whole environment section if you don't need it
    environment:
      - TZ=Asia/Kolkata
      - JAVA_TOOL_OPTIONS=-Xmx4g
      # - <ENV_VAR>=<extra configuration>
    restart: unless-stopped
