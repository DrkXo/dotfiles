services:
  mitmproxy:
    image: docker.io/mitmproxy/mitmproxy:latest
    container_name: mitmproxy

    command:
      - mitmweb
      - --mode
      - regular
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8080"
      - --web-host
      - 0.0.0.0
      - --web-port
      - "8081"

    ports:
      - "8080:8080"
      - "8081:8081"

    volumes:
      - ./mitmproxy_certs:/home/mitmproxy/.mitmproxy:Z

    restart: unless-stopped

    stdin_open: true
    tty: true
