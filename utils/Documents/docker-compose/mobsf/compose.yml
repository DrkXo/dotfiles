services:
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: mobsf

    user: root

    ports:
      - "8000:8000"

    stdin_open: true
    tty: true

    security_opt:
      - seccomp=unconfined

    restart: unless-stopped

    volumes:
      - ./mobsf_data:/home/mobsf/.MobSF
