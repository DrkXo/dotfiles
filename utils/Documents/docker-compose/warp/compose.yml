services:
  warp:
    image: docker.io/caomingjun/warp
    container_name: warp
    restart: always
    # Comment this out for rootless Podman:
    # device_cgroup_rules:
    #   - 'c 10:200 rwm'

    # Add this instead:
    devices:
      - "/dev/net/tun:/dev/net/tun"
    ports:
      - "1080:1080"
    environment:
      - WARP_SLEEP=2
    cap_add:
      - MKNOD
      - AUDIT_WRITE
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./data:/var/lib/cloudflare-warp
