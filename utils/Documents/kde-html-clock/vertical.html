<div style="
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'JetBrainsMono Nerd Font', monospace;
  line-height:1;
">

  <!-- Time Block -->
  <div style="
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:4px;
  ">
    <div style="
      font-size:18px;
      font-weight:700;
      letter-spacing:1px;
    ">
      {kk}
    </div>

    <div style="
      font-size:18px;
      font-weight:700;
      margin-top:-2px;
      letter-spacing:1px;
    ">
      {ii}
    </div>

    <div style="
      font-size:8px;
      letter-spacing:2px;
      opacity:0.6;
      margin-top:2px;
    ">
      {AA}
    </div>
  </div>

  <!-- Divider -->
  <div style="
    width:12px;
    height:1px;
    background:currentColor;
    opacity:0.2;
    margin:2px 0 4px 0;
  "></div>

  <!-- Date Block -->
  <div style="
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:9px;
    opacity:0.7;
    line-height:1.2;
    letter-spacing:0.5px;
  ">
    <div>{DD}</div>
    <div style="opacity:0.6;">{dd}</div>
    <div style="opacity:0.6;">{MM}</div>
  </div>

</div>
